# Gourmand Exceptions
# Documented exceptions for files that legitimately trigger checks

# Summary litter — CLAUDE.md is a standard Claude Code project instructions file
[[exceptions]]
check = "summary_litter"
path = "CLAUDE.md"
justification = "Claude Code project instructions for AI assistant orientation"

# Lint suppression — test intentionally passes invalid args to verify rejection
[[exceptions]]
check = "lint_suppression"
path = "tests/test_validation.py"
justification = "type: ignore[call-arg] is required to test that Pydantic rejects extra fields"

# Primitive obsession — HTTP status codes and token expiry buffer are standard patterns
[[exceptions]]
check = "primitive_obsession"
path = "src/mcp_google_search_console_crunchtools/client.py"
justification = "HTTP status codes (401, 403, 404, 429, 204) and response size limit (10MB) are standard well-known constants"

[[exceptions]]
check = "primitive_obsession"
path = "src/mcp_google_search_console_crunchtools/config.py"
justification = "Port 8017 is a standard default for HTTP servers"

[[exceptions]]
check = "primitive_obsession"
path = "src/mcp_google_search_console_crunchtools/__init__.py"
justification = "Port 8017 is a standard default for HTTP servers"

# Implicit state machine — optional parameter builders are not state machines
[[exceptions]]
check = "implicit_state_machine"
path = "src/mcp_google_search_console_crunchtools/tools/analytics.py"
justification = "Optional API parameter builders use simple if-guards to add query params, not state machines"

[[exceptions]]
check = "implicit_state_machine"
path = "src/mcp_google_search_console_crunchtools/client.py"
justification = "Error handling dispatches on HTTP status codes — standard pattern, not a state machine"

# Single-use helper — extracting error body parsing avoids too-many-branches in _handle_error_response
[[exceptions]]
check = "single_use_helpers"
path = "src/mcp_google_search_console_crunchtools/client.py"
justification = "Inlining _parse_error_body into _handle_error_response triggers PLR0912 (too many branches) — extraction is the correct fix for branch complexity"
